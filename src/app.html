<!doctype html>

<html
  lang="%paraglide.lang%"
  dir="%paraglide.dir%"
  class="%theme%"
>
  <head>
    <meta charset="utf-8" />

    <title>Bankroll Simulator</title>

    <script>
      if (!document.documentElement.classList.contains('dark')) {
        const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark'
          : 'light';
        document.documentElement.classList = systemTheme;
      }
    </script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />

    <link
      rel="icon"
      type="image/png"
      href="/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <link
      rel="shortcut icon"
      href="/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="Bankroll"
    />
    <link
      rel="manifest"
      href="/site.webmanifest"
    />

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
